# SCDC 项目 Docker Compose 配置
#
# 服务架构说明：
# - 数据库层：PostgreSQL（主数据库）、Redis（缓存）
# - 搜索引擎：SerpAPI（Google 搜索 API）、OpenSearch（全文检索）、Milvus（向量检索）
# - 对象存储：MinIO（文件存储）
# - 应用层：Backend（FastAPI）、Frontend（Vue + Nginx）
# - 监控层：Prometheus（指标采集）、Grafana（可视化面板）
#
# 启动命令：docker compose up -d
# 访问地址：http://localhost:8888（前端）、http://localhost:8000（后端 API）

version: "3.8"

# 自定义网络，确保所有容器在同一隔离网络中通信
networks:
  scdc_net:
    driver: bridge

# 持久化数据卷，容器删除后数据不丢失
volumes:
  postgres_data:    # PostgreSQL 数据库文件
  redis_data:       # Redis 缓存数据
  minio_data:       # MinIO 对象存储文件
  opensearch_data:  # OpenSearch 索引数据
  milvus_data:      # Milvus 向量数据库文件
  prom_data:        # Prometheus 监控数据
  grafana_data:     # Grafana 面板配置

services:
  # ===== 数据库层 =====
  
  # PostgreSQL：主数据库，存储用户、任务、报告等业务数据
  postgres:
    image: postgres:15-alpine
    container_name: scdc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scdc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scdc_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis：缓存服务，用于会话存储和限流
  redis:
    image: redis:7-alpine
    container_name: scdc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== 搜索引擎层 =====
  # SerpAPI：Google 搜索 API，为 CollectorAgent 提供高质量搜索结果
  # 无需 Docker 容器，直接通过 API 调用

  # ===== 对象存储 =====
  
  # MinIO：S3 兼容的对象存储服务，用于存储上传的文档和导出的报告
  minio:
    image: minio/minio:latest
    container_name: scdc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台端口
    volumes:
      - minio_data:/data
    networks:
      - scdc_net
    restart: unless-stopped

  # ===== 搜索与向量数据库 =====
  
  # OpenSearch：全文搜索引擎，用于文档内容检索
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: scdc_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"  # 开发环境禁用安全插件
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "StrongPassword123!"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - scdc_net
    restart: unless-stopped

  # Milvus：向量数据库，用于语义搜索和相似度匹配
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: scdc_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - scdc_net
    restart: unless-stopped

  # ===== 应用层 =====
  
  # Backend：FastAPI 后端服务，提供 AI Agent 流水线和业务 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scdc_backend
    environment:
      APP_ENV: "production"
      POSTGRES_DSN: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      ASYNC_POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      REDIS_URL: "redis://redis:6379/0"
      SERPAPI_KEY: "26d6525a9b1c53ee9f08fc2c744e9e096991e4a27828693b58e404d8028a9e6a"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "scdc-storage"
      OPENSEARCH_URL: "http://opensearch:9200"
      MILVUS_URL: "http://milvus:19530"
      OLLAMA_BASE_URL: "http://120.79.96.231:6003"  # GPUStack 远程模型服务（公网 IP）
      DEFAULT_MODEL: "qwen3-vl-32b-instruct-gguf"
      LLM_API_KEY: "gpustack_35d38e92e85f9689_acbc5009938cc7513ae70f7d71eaf7ba"
      LLM_PROVIDER: "gpustack"
    ports:
      - "8000:8000"
    networks:
      - scdc_net
    depends_on:
      postgres:
        condition: service_healthy  # 等待 PostgreSQL 健康后再启动
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend：Vue 前端应用，通过 Nginx 提供静态资源和反向代理
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scdc_frontend
    ports:
      - "8888:80"  # 宿主机 8888 端口映射到容器 80 端口
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # 挂载 Nginx 配置
    networks:
      - scdc_net
    depends_on:
      - backend
    restart: unless-stopped

  # ===== 监控层 =====
  
  # Prometheus：指标采集服务，从 /api/v1/metrics 端点抓取后端性能数据
  prometheus:
    image: prom/prometheus:latest
    container_name: scdc_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - scdc_net
    restart: unless-stopped

  # Grafana：可视化监控面板，展示系统运行状态
  grafana:
    image: grafana/grafana:latest
    container_name: scdc_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - scdc_net
    restart: unless-stopped
