# SCDC 项目 Docker Compose 配置
#
# 服务架构说明：
# - 数据库层：PostgreSQL（主数据库）、Redis（缓存）
# - 搜索引擎：SerpAPI（Google 搜索 API）、OpenSearch（全文检索）、Milvus（向量检索）
# - 对象存储：MinIO（文件存储）
# - 应用层：Backend（FastAPI）、Frontend（Vue + Nginx）
# - 监控层：Prometheus（指标采集）、Grafana（可视化面板）
#
# 启动命令：docker compose up -d
# 访问地址：http://localhost:8888（前端）、http://localhost:8000（后端 API）

version: "3.8"

# 自定义网络，确保所有容器在同一隔离网络中通信
networks:
  scdc_net:
    driver: bridge

# 持久化数据卷，容器删除后数据不丢失
volumes:
  postgres_data:    # PostgreSQL 数据库文件
  redis_data:       # Redis 缓存数据
  minio_data:       # MinIO 对象存储文件
  opensearch_data:  # OpenSearch 索引数据
  milvus_data:      # Milvus 向量数据库文件
  etcd_data:        # etcd 键值存储（Milvus 依赖）
  minio_milvus_data: # MinIO 对象存储（Milvus 依赖）
  ollama_data:      # Ollama 模型文件持久化
  prom_data:        # Prometheus 监控数据
  grafana_data:     # Grafana 面板配置

services:
  # ===== 数据库层 =====
  
  # PostgreSQL：主数据库，存储用户、任务、报告等业务数据
  postgres:
    image: postgres:15-alpine
    container_name: scdc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scdc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scdc_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis：缓存服务，用于会话存储和限流
  redis:
    image: redis:7-alpine
    container_name: scdc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== 搜索引擎层 =====
  # SerpAPI：Google 搜索 API，为 CollectorAgent 提供高质量搜索结果
  # 无需 Docker 容器，直接通过 API 调用

  # ===== 对象存储 =====
  
  # MinIO：S3 兼容的对象存储服务，用于存储上传的文档和导出的报告
  minio:
    image: minio/minio:latest
    container_name: scdc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台端口
    volumes:
      - minio_data:/data
    networks:
      - scdc_net
    restart: unless-stopped

  # ===== 搜索与向量数据库 =====
  
  # OpenSearch：全文搜索引擎，用于文档内容检索
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: scdc_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"  # 开发环境禁用安全插件
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "StrongPassword123!"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - scdc_net
    restart: unless-stopped

  # etcd：键值存储，Milvus 元数据协调器
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: scdc_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - scdc_net
    restart: unless-stopped

  # MinIO 对象存储（Milvus 依赖）
  minio_milvus:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: scdc_minio_milvus
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_milvus_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - scdc_net
    restart: unless-stopped

  # Milvus：向量数据库，用于语义搜索和相似度匹配
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: scdc_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
      COMMON_STORAGETYPE: "local"
    security_opt:
      - seccomp:unconfined
    ports:
      - "19530:19530"
      - "9091:9091"
    cap_add:
      - SYS_PTRACE
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - scdc_net
    restart: unless-stopped

  # ===== 推理与嵌入服务 =====
  # Ollama：本地 LLM 推理 + Embedding 服务
  # - 提供 OpenAI 兼容端点 (/v1/chat/completions, /v1/embeddings) 与 Ollama 原生端点 (/api/*)
  # - 通过 ollama_data 卷持久化已下载的模型（避免重建容器时重复下载 1GB+ 模型）
  ollama:
    image: ollama/ollama:latest
    container_name: scdc_ollama
    ports:
      - "11434:11434"  # 宿主机 11434 映射到容器 11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - scdc_net
    healthcheck:
      # 镜像里没装 curl/wget/nc，改用 pgrep 进程探测
      test: ["CMD-SHELL", "pgrep -f 'ollama serve' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===== 应用层 =====
  
  # Backend：FastAPI 后端服务，提供 AI Agent 流水线和业务 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scdc_backend
    environment:
      APP_ENV: "production"
      POSTGRES_DSN: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      ASYNC_POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      REDIS_URL: "redis://redis:6379/0"
      SERPAPI_KEY: "26d6525a9b1c53ee9f08fc2c744e9e096991e4a27828693b58e404d8028a9e6a"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "scdc-storage"
      OPENSEARCH_URL: "http://opensearch:9200"
      MILVUS_URL: "http://milvus:19530"
      OLLAMA_BASE_URL: "http://ollama:11434"  # 容器内访问 ollama 服务（Docker 网络名）
      DEFAULT_MODEL: "qwen3-vl-32b-instruct-gguf"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_PROVIDER: "gpustack"
      EMBEDDING_MODEL: "nomic-embed-text"     # Ollama 端 embedding 模型名
    ports:
      - "8000:8000"
    networks:
      - scdc_net
    depends_on:
      postgres:
        condition: service_healthy  # 等待 PostgreSQL 健康后再启动
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy  # 等待 Ollama 就绪后再启动（避免首调用卡下载）
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Frontend：Vue 前端应用，通过 Nginx 提供静态资源和反向代理
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scdc_frontend
    ports:
      - "6015:80"  # 宿主机 6015 端口映射到容器 80 端口
    networks:
      - scdc_net
    depends_on:
      backend:
        condition: service_healthy  # 等待后端服务健康后再开始代理
    restart: unless-stopped

  # ===== 监控层 =====
  
  # Prometheus：指标采集服务，从 /api/v1/metrics 端点抓取后端性能数据
  prometheus:
    image: prom/prometheus:latest
    container_name: scdc_prometheus
    ports:
      - "9090:9090"
    networks:
      - scdc_net
    restart: unless-stopped

  # Grafana：可视化监控面板，展示系统运行状态
  grafana:
    image: grafana/grafana:latest
    container_name: scdc_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - scdc_net
    restart: unless-stopped
