version: "3.8"

networks:
  scdc_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  milvus_data:
  prom_data:
  grafana_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: scdc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scdc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scdc_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scdc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scdc_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: scdc_searxng
    ports:
      - "8080:8080"
    networks:
      - scdc_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: scdc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - scdc_net
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: scdc_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "StrongPassword123!"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - scdc_net
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: scdc_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - scdc_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scdc_backend
    environment:
      APP_ENV: "production"
      POSTGRES_DSN: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      ASYNC_POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-scdc_db}"
      REDIS_URL: "redis://redis:6379/0"
      SEARXNG_URL: "http://searxng:8080"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "scdc-storage"
      OPENSEARCH_URL: "http://opensearch:9200"
      MILVUS_URL: "http://milvus:19530"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    ports:
      - "8000:8000"
    networks:
      - scdc_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scdc_frontend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - scdc_net
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: scdc_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - scdc_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: scdc_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - scdc_net
    restart: unless-stopped
