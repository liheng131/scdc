# Nginx 反向代理配置
# 
# 职责：
# 1. 作为前端静态资源服务器，提供 Vue SPA 应用
# 2. 反向代理后端 API 请求，解决跨域问题
# 3. 支持 SSE（Server-Sent Events）长连接，用于实时任务进度推送
#
# 为什么使用 try_files 处理 SPA 路由：
# - Vue Router 使用 history 模式，刷新页面时 URL 路径在 Nginx 中不存在
# - try_files 确保所有未匹配的路由都回退到 index.html，由 Vue Router 接管
#
# 为什么 proxy_read_timeout 和 proxy_send_timeout 设为 86400s（24 小时）：
# - SSE 连接是长连接，后端可能长时间保持连接以推送任务进度
# - 默认 60s 超时会导致 SSE 连接频繁断开，影响前端实时感知任务状态
#
# 为什么 proxy_set_header Host 使用 $http_host 而非 $host：
# - $http_host 包含端口号（如 localhost:8888），$host 不包含
# - 后端重定向时需要完整的主机信息，避免 307 重定向丢失端口

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;  # 允许上传最大文件大小（100MB）

    # Gzip 压缩：减少传输体积，提升加载速度
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 静态资源 SPA 路由
    # 所有前端文件由 Nginx 直接提供，未匹配的路由回退到 index.html
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API 和 SSE
    # 所有 /api/ 开头的请求转发到后端 FastAPI 服务
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";  # 支持 WebSocket/SSE 升级
        proxy_set_header Host $http_host;  # 保留端口信息，避免重定向丢失
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://backend:8000/ /;  # 修正后端 307 重定向的 Location 头

        proxy_buffering off;  # 关闭缓冲，SSE 实时推送需要立即转发
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;   # SSE 长连接超时时间（24 小时）
        proxy_send_timeout 86400s;
    }
}
